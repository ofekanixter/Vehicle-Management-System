version: '3.8'
services:
  db:
    image: postgres:16
    container_name: drivenow_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-drivenow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-drivenow}
      POSTGRES_DB: ${POSTGRES_DB:-drivenow}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: drivenow_app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    env_file:
      - .env
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
    name: drivenow_persistent_db
    external: true

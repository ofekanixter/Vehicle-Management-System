version: '3.8'
services:
  db:
    image: postgres:16
    container_name: drivenow_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-drivenow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-drivenow}
      POSTGRES_DB: ${POSTGRES_DB:-drivenow}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-drivenow}"]
      interval: 5s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management
    container_name: drivenow_rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-guest}
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: drivenow_app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-drivenow}:${POSTGRES_PASSWORD:-drivenow}@db:5432/${POSTGRES_DB:-drivenow}
      RABBITMQ_URL: amqp://${RABBITMQ_USER:-guest}:${RABBITMQ_PASSWORD:-guest}@rabbitmq:5672/
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  worker:
    build: .
    container_name: drivenow_worker
    command: python -m worker.consumer
    env_file:
      - .env
    environment:
      RABBITMQ_URL: amqp://${RABBITMQ_USER:-guest}:${RABBITMQ_PASSWORD:-guest}@rabbitmq:5672/
    depends_on:
      rabbitmq:
        condition: service_healthy

volumes:
  pgdata:
    name: drivenow_persistent_db
